name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Pin with vcpkg-configuration.json default-registry baseline.
env:
  VCPKG_COMMIT: 8defa4b8bc4c35071c678e87a0e140dd433489bb

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lukka/get-cmake@latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit (for just bootstrap)
        run: pip install pre-commit

      - uses: extractions/setup-just@v2

      - name: Install clang-tidy
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Setup vcpkg (manifest)
        uses: ./.github/actions/vocalplayer-vcpkg-setup
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: x64-linux

      - name: Configure and build (Justfile)
        run: just build-debug

      - name: Select changed C++ source files
        id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          mapfile -t changed_raw < <(
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.cpp' '*.cc' '*.cxx'
          )
          if [ "${#changed_raw[@]}" -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No changed C++ source files detected."
            exit 0
          fi
          compile_db="build/debug/compile_commands.json"
          tidy_files="$(
            python3 - "${compile_db}" "${changed_raw[@]}" <<'PY'
          import json
          import os
          import sys

          compile_db = sys.argv[1]
          changed = sys.argv[2:]
          with open(compile_db, encoding="utf-8") as handle:
              compiled = {os.path.normpath(entry["file"]) for entry in json.load(handle)}

          selected = []
          for path in changed:
              abs_path = os.path.normpath(os.path.join(os.getcwd(), path))
              if abs_path in compiled:
                  selected.append(path)
              else:
                  print(
                      f"Skipping {path} (not in {compile_db} for this CI build)",
                      file=sys.stderr,
                  )
          print(" ".join(selected))
          PY
          )"
          echo "files=$tidy_files" >> "$GITHUB_OUTPUT"
          if [ -z "$tidy_files" ]; then
            echo "No changed files are compiled in build/debug; clang-tidy skipped."
          else
            echo "clang-tidy files: $tidy_files"
          fi

      - name: Run clang-tidy on changed files
        if: steps.changed.outputs.files != ''
        run: |
          set -euo pipefail
          for file in ${{ steps.changed.outputs.files }}; do
            echo "Running clang-tidy on $file"
            clang-tidy "$file" -p build/debug --config-file=.clang-tidy
          done

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit (for just bootstrap)
        run: pip install pre-commit

      - uses: extractions/setup-just@v2

      - name: Setup vcpkg (manifest)
        uses: ./.github/actions/vocalplayer-vcpkg-setup
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: x64-linux

      - name: Build and test (Justfile)
        run: just test
