# Shared steps: host packages, clone vcpkg at repo baseline, bootstrap, manifest install.
# Must match vcpkg-configuration.json default-registry baseline.
name: VocalPlayer vcpkg setup
description: Install host build deps, pin vcpkg to baseline, bootstrap, and vcpkg install (manifest).

inputs:
  vcpkg-commit:
    description: Git SHA of microsoft/vcpkg (same as vcpkg-configuration.json baseline).
    required: true
  triplet:
    description: vcpkg triplet (e.g. x64-linux, arm64-osx, x64-windows).
    required: true

runs:
  using: composite
  steps:
    - name: MSVC developer environment (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install host tools (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y ninja-build pkg-config nasm

    - name: Install host tools (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        brew install ninja pkg-config nasm

    - name: Install host tools (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'
        choco install ninja nasm -y

    - name: Clone and bootstrap vcpkg (Unix)
      if: runner.os != 'Windows'
      shell: bash
      env:
        VCPKG_COMMIT: ${{ inputs.vcpkg-commit }}
      run: |
        set -euo pipefail
        ROOT="${GITHUB_WORKSPACE}/vcpkg"
        echo "VCPKG_ROOT=${ROOT}" >> "${GITHUB_ENV}"
        echo "VCPKG_DEFAULT_TRIPLET=${{ inputs.triplet }}" >> "${GITHUB_ENV}"
        rm -rf "${ROOT}"
        git clone https://github.com/microsoft/vcpkg.git "${ROOT}"
        cd "${ROOT}"
        git checkout "${VCPKG_COMMIT}"
        ./bootstrap-vcpkg.sh -disableMetrics
        test -x "${ROOT}/vcpkg"
        echo "${ROOT}" >> "${GITHUB_PATH}"

    - name: Clone and bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        VCPKG_COMMIT: ${{ inputs.vcpkg-commit }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'
        $root = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'
        "VCPKG_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "VCPKG_DEFAULT_TRIPLET=${{ inputs.triplet }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        if (Test-Path $root) { Remove-Item -Recurse -Force $root }
        git clone https://github.com/microsoft/vcpkg.git $root
        Push-Location $root
        try {
          git checkout $env:VCPKG_COMMIT
          & "$root\bootstrap-vcpkg.bat" -disableMetrics
          if (-not (Test-Path "$root\vcpkg.exe")) {
            throw "bootstrap-vcpkg.bat did not produce vcpkg.exe under $root"
          }
        } finally {
          Pop-Location
        }
        $root | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: vcpkg install (manifest, Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        cd "${GITHUB_WORKSPACE}"
        "${VCPKG_ROOT}/vcpkg" install --triplet "${{ inputs.triplet }}"

    - name: vcpkg install (manifest, Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'
        Set-Location $env:GITHUB_WORKSPACE
        & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet '${{ inputs.triplet }}'
