name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Pin with vcpkg-configuration.json default-registry baseline.
env:
  VCPKG_COMMIT: 8defa4b8bc4c35071c678e87a0e140dd433489bb

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lukka/get-cmake@latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit (for just bootstrap)
        run: pip install pre-commit

      - uses: extractions/setup-just@v2

      - name: Install clang-tidy
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Setup vcpkg (manifest)
        uses: ./.github/actions/vocalplayer-vcpkg-setup
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: x64-linux

      - name: Configure and build (Justfile)
        run: just build-debug

      - name: Select changed C++ source files
        id: changed
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.cpp' '*.cc' '*.cxx' | tr '\n' ' ')"
          echo "files=$changed_files" >> "$GITHUB_OUTPUT"
          if [ -z "$changed_files" ]; then
            echo "No changed C++ source files detected."
          else
            echo "Changed files: $changed_files"
          fi

      - name: Run clang-tidy on changed files
        if: steps.changed.outputs.files != ''
        run: |
          set -euo pipefail
          for file in ${{ steps.changed.outputs.files }}; do
            echo "Running clang-tidy on $file"
            clang-tidy "$file" -p build/debug --config-file=.clang-tidy
          done

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit (for just bootstrap)
        run: pip install pre-commit

      - uses: extractions/setup-just@v2

      - name: Setup vcpkg (manifest)
        uses: ./.github/actions/vocalplayer-vcpkg-setup
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: x64-linux

      - name: Build and test (Justfile)
        run: just test
