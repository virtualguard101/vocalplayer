name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

# Pin with vcpkg-configuration.json default-registry baseline.
env:
  VCPKG_COMMIT: 8defa4b8bc4c35071c678e87a0e140dd433489bb

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            triplet: x64-linux
            package_format: tar.gz
          - os: macos-latest
            label: macos-arm64
            triplet: arm64-osx
            package_format: tar.gz
          - os: windows-latest
            label: windows-x86_64
            triplet: x64-windows
            package_format: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest

      - name: Setup vcpkg (manifest)
        uses: ./.github/actions/vocalplayer-vcpkg-setup
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: ${{ matrix.triplet }}

      - name: Configure (CMake preset release)
        run: cmake --preset release

      - name: Build
        run: cmake --build build/release --parallel 4

      - name: Run tests
        run: ctest --test-dir build/release --output-on-failure

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          package_name="vocalplayer-${tag_name}-${{ matrix.label }}"
          stage_dir="dist/${package_name}"
          mkdir -p "$stage_dir"
          if [ -f build/release/vocalplayer ]; then
            cp build/release/vocalplayer "$stage_dir/"
          elif [ -f build/release/vocalplayer.exe ]; then
            cp build/release/vocalplayer.exe "$stage_dir/"
          else
            echo "vocalplayer binary not found under build/release/." >&2
            exit 1
          fi
          if [ "${{ matrix.package_format }}" = "zip" ]; then
            cmake -E tar "cfv" "dist/${package_name}.zip" --format=zip "$stage_dir"
          else
            cmake -E tar "cfvz" "dist/${package_name}.tar.gz" --format=gnutar "$stage_dir"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
